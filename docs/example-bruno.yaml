# Bruno OpenCollection YAML – comprehensive test fixture for ReDocs import.
# Covers: GET/POST/PUT/DELETE, headers, JSON body, multiline body, bearer auth, variables.
# Use this file to verify Bruno YAML detection and parsing (see minimalYaml tests).

info:
  name: Get User
  type: http
  seq: 1
http:
  method: GET
  url: https://api.example.com/users/1
  headers:
    - name: Accept
      value: application/json
---
info:
  name: Get Users (query params)
  type: http
  seq: 2
http:
  method: GET
  url: https://api.example.com/users?page=1&limit=10
  headers:
    - name: Accept
      value: application/json
    - name: X-Request-ID
      value: "{{requestId}}"
---
info:
  name: Create User
  type: http
  seq: 3
http:
  method: POST
  url: https://api.example.com/users
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {"name":"Test","email":"test@example.com"}
---
info:
  name: Update User (PUT)
  type: http
  seq: 4
http:
  method: PUT
  url: https://api.example.com/users/usr_123
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {"name":"Updated Name","active":true}
---
info:
  name: Delete User
  type: http
  seq: 5
http:
  method: DELETE
  url: https://api.example.com/users/usr_456
  headers:
    - name: Accept
      value: application/json
---
info:
  name: Auth required
  type: http
  seq: 6
http:
  method: GET
  url: https://api.example.com/me
  headers:
    - name: Authorization
      value: Bearer {{token}}
  auth:
    type: bearer
    token: "{{token}}"
