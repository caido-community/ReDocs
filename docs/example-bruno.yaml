info:
  name: Get User
  type: http
  seq: 1
http:
  method: GET
  url: https://api.example.com/users/1
  headers:
    - name: Accept
      value: application/json
---
info:
  name: Get Users (query params)
  type: http
  seq: 2
http:
  method: GET
  url: https://api.example.com/users?page=1&limit=10&sort=name
  headers:
    - name: Accept
      value: application/json
    - name: X-Request-ID
      value: "{{requestId}}"
---
info:
  name: Create User
  type: http
  seq: 3
http:
  method: POST
  url: https://api.example.com/users
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {"name":"Test","email":"test@example.com","role":"admin"}
---
info:
  name: Submit Form
  type: http
  seq: 4
http:
  method: POST
  url: https://api.example.com/feedback
  headers:
    - name: Content-Type
      value: application/x-www-form-urlencoded
  body:
    type: form
    data:
      - name: subject
        value: ReDocs Test
      - name: message
        value: Hello world
      - name: priority
        value: high
---
info:
  name: Update User (PUT)
  type: http
  seq: 5
http:
  method: PUT
  url: https://api.example.com/users/usr_123
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |
      {"name":"Updated Name","active":true}
---
info:
  name: Delete User
  type: http
  seq: 6
http:
  method: DELETE
  url: https://api.example.com/users/usr_456
  headers:
    - name: Accept
      value: application/json
---
info:
  name: Auth required (Bearer)
  type: http
  seq: 7
http:
  method: GET
  url: https://api.example.com/me
  headers:
    - name: Authorization
      value: Bearer {{token}}
  auth:
    type: bearer
    token: "{{token}}"
---
info:
  name: API Key endpoint
  type: http
  seq: 8
http:
  method: GET
  url: https://api.example.com/admin/config
  headers:
    - name: X-API-Key
      value: "{{apiKey}}"
    - name: Accept
      value: application/json
